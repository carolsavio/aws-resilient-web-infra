<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #f8f8f8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: sans-serif;
  }
  .card {
    text-align: center;
    padding: 60px 80px;
    background: #fff;
    border-radius: 16px;
    border: 1px solid #e8e8e8;
  }
  .dot-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 24px;
  }
  .dot {
    width: 12px;
    height: 12px;
    background: #22c55e;
    border-radius: 50%;
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .status-text {
    font-size: 13px;
    color: #22c55e;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 500;
  }
  h1 {
    font-size: 32px;
    font-weight: 600;
    color: #111;
    margin-bottom: 8px;
  }
  p {
    font-size: 14px;
    color: #999;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="dot-wrap">
      <div class="dot"></div>
      <span class="status-text">Online</span>
    </div>
    <h1>Apache Status</h1>
    <p>AWS EC2 · us-east-1</p>
  </div>
</body>
</html>
